name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on the same branch/PR when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ── 1. Code Style ──────────────────────────────────────────────────────────
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-lint-${{ hashFiles('composer.lock') }}
          restore-keys: composer-lint-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Check code style
        run: vendor/bin/pint --test

  # ── 2. Security Audit ──────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check for known vulnerabilities
        run: composer audit --no-dev

  # ── 3. Tests ───────────────────────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-test-${{ hashFiles('composer.lock') }}
          restore-keys: composer-test-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan passport:keys

      - name: Run tests
        run: php artisan test --parallel
